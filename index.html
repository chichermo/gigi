<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0a12" />
  <meta name="description" content="Jouw slimme spiegel — meningen, complimenten en stijl via spraak" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Mirror" />
  <title>Mirror — Jouw Slimme Spiegel</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/svg+xml" href="icons/icon.svg" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <section id="screen-welcome" class="screen active">
      <div class="welcome-content">
        <header class="welcome-hero">
          <div class="logo-ring">
            <span class="logo-icon" aria-hidden="true">✨</span>
          </div>
          <h1 id="app-title">Mirror</h1>
          <p class="tagline" data-i18n="tagline"></p>
          <p class="subtitle" data-i18n="subtitle"></p>
        </header>

        <div id="install-section" class="install-section install-section--top">
          <p id="install-ready" class="install-ready" data-i18n="installReady"></p>
          <button type="button" id="btn-install-welcome" class="btn-install">
            <span aria-hidden="true">📲</span>
            <span data-i18n="installWelcomeBtn"></span>
          </button>
          <p id="install-hint" class="install-hint"></p>
        </div>

        <div class="settings-card">
          <div class="lang-picker hidden" aria-hidden="true">
            <label for="lang-select" class="field-label" data-i18n="languageLabel"></label>
            <select id="lang-select" class="field-select" aria-label="Taal">
              <option value="nl" selected>Nederlands</option>
            </select>
          </div>

          <div class="voice-picker">
            <label class="field-label" data-i18n="voiceLabel"></label>
            <div id="voice-mobile-info" class="voice-mobile-info hidden">
              <p class="voice-mobile-title" data-i18n="voiceMobileTitle"></p>
              <p class="voice-mobile-text" id="voice-mobile-guide"></p>
            </div>
            <p id="voice-desktop-note" class="voice-desktop-note hidden" data-i18n="voiceMobileDesktopNote"></p>
            <label class="voice-filter">
              <input type="checkbox" id="voice-female-only" checked />
              <span data-i18n="voiceFemaleOnly"></span>
            </label>
            <label class="voice-filter" id="voice-phone-filter-wrap">
              <input type="checkbox" id="voice-phone-only" checked />
              <span data-i18n="voicePhoneOnly"></span>
            </label>
            <p class="voice-hint" data-i18n="voiceSelectHint"></p>
            <p id="voice-count" class="voice-count" aria-live="polite"></p>
            <ul id="voice-list-welcome" class="voice-list" role="listbox" aria-label="Stemmen"></ul>
          </div>
        </div>

        <div class="welcome-actions">
          <button id="btn-start" class="btn-primary">
            <span class="btn-icon" aria-hidden="true">🎙️</span>
            <span id="btn-start-label" data-i18n="btnStart"></span>
          </button>
          <p id="wake-hint" class="wake-hint"></p>
          <p class="hint" data-i18n="hint"></p>
        </div>
      </div>
    </section>

    <section id="screen-mirror" class="screen">
      <div class="mirror-container">
        <div class="mirror-frame">
          <video id="camera" autoplay playsinline muted></video>
        </div>
        <canvas id="snapshot" hidden></canvas>

        <div class="mirror-overlay">
          <header class="mirror-header">
            <div class="header-left">
              <button id="btn-questions" class="btn-icon-only" title="Preguntas sugeridas" aria-label="Preguntas sugeridas" aria-expanded="false">💡</button>
              <div class="status-pill" id="status-pill">
                <span class="status-dot" id="status-dot"></span>
                <span id="status-text" data-i18n="statusInit"></span>
              </div>
            </div>
            <div class="header-right">
              <span class="mirror-brand" aria-hidden="true">Mirror</span>
              <button id="btn-voice-settings" class="btn-icon-only" title="Cambiar voz" aria-label="Cambiar voz">🗣️</button>
              <button id="btn-install" class="btn-icon-only" title="App installeren" aria-label="App installeren">📲</button>
            </div>
          </header>

          <div id="voice-settings-panel" class="settings-panel hidden" aria-label="Configuración de voz">
            <p class="panel-title" data-i18n="voiceLabel"></p>
            <div id="voice-mobile-info-mirror" class="voice-mobile-info hidden">
              <p class="voice-mobile-title" data-i18n="voiceMobileTitle"></p>
              <p class="voice-mobile-text" id="voice-mobile-guide-mirror"></p>
            </div>
            <label class="voice-filter">
              <input type="checkbox" id="voice-female-only-mirror" checked />
              <span data-i18n="voiceFemaleOnly"></span>
            </label>
            <label class="voice-filter voice-phone-filter-mirror">
              <input type="checkbox" id="voice-phone-only-mirror" checked />
              <span data-i18n="voicePhoneOnly"></span>
            </label>
            <p class="voice-hint" data-i18n="voiceSelectHint"></p>
            <p id="voice-count-mirror" class="voice-count" aria-live="polite"></p>
            <ul id="voice-list-mirror" class="voice-list" role="listbox" aria-label="Stemmen"></ul>
          </div>

          <nav id="questions-menu" class="questions-menu hidden" aria-label="Vragen">
            <p class="panel-title" data-i18n="questionsTitle"></p>
            <p class="questions-menu-sub" data-i18n="questionsMenuSub"></p>
            <ul id="questions-list" class="questions-list"></ul>
          </nav>

          <div class="marble-avatar" id="marble-avatar" aria-hidden="true">
            <div class="avatar-ring speaking" id="avatar-ring">
              <span>💬</span>
            </div>
          </div>

          <div class="mirror-body">
            <div class="transcript-panel" id="transcript-panel">
              <div class="transcript-block assistant-block">
                <p class="transcript-label" data-i18n="assistantSays"></p>
                <p class="transcript-text" id="assistant-text">—</p>
              </div>
              <div class="transcript-block user-block">
                <p class="transcript-label user-label" data-i18n="youSay"></p>
                <p class="transcript-text user-text" id="user-text">—</p>
              </div>
            </div>

            <footer class="mirror-footer">
              <p class="user-greeting" id="user-greeting"></p>
              <div class="control-dock">
                <button id="btn-mute" class="btn-control btn-side" title="Silenciar" aria-label="Silenciar">🔊</button>
                <button id="btn-listen" class="btn-control btn-listen active" title="Escuchar" aria-label="Escuchar">
                  <span class="mic-pulse"></span>
                  🎤
                </button>
                <button id="btn-capture" class="btn-control btn-side" title="Analizar" aria-label="Analizar">📸</button>
              </div>
            </footer>
          </div>
        </div>
      </div>
    </section>
  </div>

  <script src="js/i18n.js"></script>
  <script src="js/wake-word.js"></script>
  <script src="js/nl-phrases.js"></script>
  <script src="js/phrase-pools.js"></script>
  <script src="js/questions-menu.js"></script>
  <script src="js/tts-prep.js"></script>
  <script src="js/brain.js"></script>
  <script src="js/image-analysis.js"></script>
  <script src="js/voice.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
